<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MathBlast! Hardcore 🧠</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    --panel: rgba(255, 255, 255, 0.15);
    --glass: rgba(255, 255, 255, 0.25);
    --accent: #00f5d4;
    --accent2: #f72585;
    --accent3: #fee440;
    --text: #ffffff;
    --correct: #00ff88;
    --wrong: #ff4d4d;
    --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  @media (min-width: 1025px) {
    body::after {
      content: "📱 Por favor, abra este jogo em um Celular ou Tablet.";
      position: fixed; inset: 0; background: #1a1a2e; color: white;
      display: flex; align-items: center; justify-content: center;
      z-index: 9999; font-size: 1.5rem; text-align: center; padding: 20px;
    }
  }

  .glass-card {
    background: var(--glass);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.18);
    border-radius: 24px;
    box-shadow: var(--shadow);
  }

  .screen {
    display: none;
    width: 90vw;
    max-width: 500px;
    padding: 25px;
    flex-direction: column;
    align-items: center;
    z-index: 10;
  }
  .screen.active { display: flex; }

  .logo {
    font-family: 'Press Start 2P', monospace;
    font-size: 1.8rem;
    text-align: center;
    margin-bottom: 20px;
    text-shadow: 0 4px 10px rgba(0,0,0,0.3);
  }
  .logo span { display: block; }
  .logo .plus { color: var(--accent3); }

  .diff-btn {
    padding: 15px 25px;
    margin: 5px;
    border-radius: 50px;
    border: none;
    background: var(--panel);
    color: white;
    font-weight: 900;
    cursor: pointer;
    transition: 0.3s;
  }
  .diff-btn.selected { background: white; color: #764ba2; box-shadow: 0 0 15px white; }

  .start-btn {
    font-family: 'Press Start 2P', monospace;
    width: 100%;
    padding: 20px;
    margin-top: 30px;
    background: var(--accent2);
    border: none;
    border-radius: 15px;
    color: white;
    font-size: 1rem;
    box-shadow: 0 10px 20px rgba(247,37,133,0.4);
    cursor: pointer;
  }

  .top-stats {
    display: flex;
    justify-content: space-between;
    width: 100%;
    margin-bottom: 20px;
  }
  .stat-box {
    background: var(--panel);
    padding: 10px;
    border-radius: 12px;
    text-align: center;
    flex: 1;
    margin: 0 5px;
  }
  .stat-label { font-size: 0.6rem; font-family: 'Press Start 2P'; opacity: 0.8; }
  .stat-val { font-size: 1.2rem; font-weight: 900; display: block; }

  #timerVal.danger { color: var(--wrong); text-shadow: 0 0 10px var(--wrong); animation: blink 0.5s infinite; }

  @keyframes blink { 50% { opacity: 0.5; } }

  .question-text { font-size: 3.5rem; font-weight: 900; margin: 20px 0; }

  .options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    width: 100%;
  }
  .opt-btn {
    height: 80px;
    background: var(--panel);
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 18px;
    font-size: 2rem;
    font-weight: 900;
    color: white;
    transition: 0.2s;
    cursor: pointer;
  }
  .opt-btn:active { transform: scale(0.95); }
  .opt-btn.correct { background: var(--correct) !important; color: #004422; }
  .opt-btn.wrong { background: var(--wrong) !important; }

  .progress-container {
    width: 100%;
    height: 8px;
    background: rgba(0,0,0,0.2);
    border-radius: 10px;
    margin: 15px 0;
    overflow: hidden;
  }
  .progress-fill { height: 100%; background: var(--accent); transition: width 0.3s; }
</style>
</head>
<body>

<div class="screen active glass-card" id="startScreen">
  <div class="logo"><span class="plus">MATH</span><span>BLAST! 🚀</span></div>
  <p style="margin-bottom: 20px; font-weight: 700;">Escolha o nível:</p>
  <div style="display: flex; flex-wrap: wrap; justify-content: center;">
    <button class="diff-btn selected" data-diff="easy">Fácil (20s)</button>
    <button class="diff-btn" data-diff="medium">Médio (12s)</button>
    <button class="diff-btn" data-diff="hard">Mestre (7s)</button>
  </div>
  <button class="start-btn" id="startBtn">INICIAR DESAFIO</button>
  <p style="margin-top: 30px; font-size: 0.7rem; opacity: 0.7;">Sebastiao Alves de Almeida</p>
</div>

<div class="screen glass-card" id="gameScreen">
  <div class="top-stats">
    <div class="stat-box"><span class="stat-label">PONTOS</span><span class="stat-val" id="scoreVal">0</span></div>
    <div class="stat-box"><span class="stat-label">TEMPO</span><span class="stat-val" id="timerVal">0</span></div>
    <div class="stat-box"><span class="stat-label">VIDAS</span><span class="stat-val" id="livesVal">❤️❤️❤️</span></div>
  </div>
  <div class="progress-container"><div class="progress-fill" id="progressFill" style="width: 0%"></div></div>
  <p id="qCount" style="font-family: 'Press Start 2P'; font-size: 0.5rem; margin-top: 10px;">PROVA 1/20</p>
  <div class="question-text" id="questionText">0 + 0</div>
  <div class="options-grid" id="optionsGrid"></div>
</div>

<div class="screen glass-card" id="endScreen">
  <div class="logo"><span class="plus">RESULTADO</span></div>
  <div id="finalEmoji" style="font-size: 4rem;">🏆</div>
  <h2 id="finalTitle" style="margin: 15px 0;">Fim de Jogo!</h2>
  <div class="stat-box" style="width: 100%; margin-bottom: 20px;">
    <span class="stat-label">PONTUAÇÃO TOTAL</span>
    <span class="stat-val" id="finalScore" style="font-size: 2.5rem;">0</span>
  </div>
  <button class="start-btn" onclick="location.reload()">JOGAR NOVAMENTE</button>
</div>

<script>
  const DIFFICULTIES = {
    easy:   { max: 10, totalQ: 20, time: 20 }, 
    medium: { max: 30, totalQ: 25, time: 12 }, 
    hard:   { max: 99, totalQ: 35, time: 7 }   
  };

  let state = {
    diff: 'easy',
    score: 0,
    lives: 3,
    current: 0,
    timeLeft: 0,
    timer: null,
    ans: 0,
    isPaused: false
  };

  document.querySelectorAll('.diff-btn').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      state.diff = btn.dataset.diff;
    };
  });

  document.getElementById('startBtn').onclick = () => {
    document.getElementById('startScreen').classList.remove('active');
    document.getElementById('gameScreen').classList.add('active');
    initGame();
  };

  function initGame() {
    state.score = 0; state.lives = 3; state.current = 0;
    document.getElementById('scoreVal').innerText = "0";
    updateLives();
    nextQuestion();
  }

  function nextQuestion() {
    const cfg = DIFFICULTIES[state.diff];
    if(state.current >= cfg.totalQ || state.lives <= 0) return endGame();

    state.isPaused = false;
    state.current++;
    document.getElementById('qCount').innerText = `PROVA ${state.current}/${cfg.totalQ}`;
    document.getElementById('progressFill').style.width = (state.current/cfg.totalQ * 100) + "%";
    
    let a = Math.floor(Math.random() * cfg.max) + 1;
    let b = Math.floor(Math.random() * cfg.max) + 1;
    let op = Math.random() > 0.5 ? '+' : '-';
    if(op === '-' && a < b) [a, b] = [b, a];
    
    state.ans = op === '+' ? a + b : a - b;
    document.getElementById('questionText').innerText = `${a} ${op} ${b}`;

    // LÓGICA DE RESPOSTAS PARECIDAS (DISTRATORES)
    let opts = new Set([state.ans]);
    
    // 1. Erro de dezena (ex: 18 -> 28 ou 8)
    if (state.ans > 10) opts.add(state.ans - 10);
    opts.add(state.ans + 10);

    // 2. Erro de unidade (ex: 18 -> 17 ou 19)
    opts.add(state.ans + 1);
    opts.add(state.ans - 1);

    // 3. Inversão de dígitos (ex: 18 -> 81)
    let s = state.ans.toString();
    if(s.length === 2 && s[0] !== s[1]) {
        opts.add(parseInt(s[1] + s[0]));
    }

    // Limpa negativos e garante apenas 4 opções
    let finalOpts = Array.from(opts).filter(n => n >= 0 && n !== null);
    finalOpts = finalOpts.sort(() => Math.random() - 0.5).slice(0, 4);
    
    // Se por algum motivo tiver menos de 4, preenche com aleatórios
    while(finalOpts.length < 4) {
        let rand = state.ans + Math.floor(Math.random() * 10) - 5;
        if(!finalOpts.includes(rand) && rand >= 0) finalOpts.push(rand);
    }

    const grid = document.getElementById('optionsGrid');
    grid.innerHTML = '';
    finalOpts.sort(() => Math.random() - 0.5).forEach(o => {
      const b = document.createElement('button');
      b.className = 'opt-btn';
      b.innerText = o;
      b.onclick = () => checkAns(o, b);
      grid.appendChild(b);
    });

    startTimer(cfg.time);
  }

  function startTimer(t) {
    clearInterval(state.timer);
    state.timeLeft = t;
    const timerEl = document.getElementById('timerVal');
    timerEl.innerText = state.timeLeft;
    timerEl.classList.remove('danger');
    state.timer = setInterval(() => {
      if(state.isPaused) return;
      state.timeLeft--;
      timerEl.innerText = state.timeLeft;
      if(state.timeLeft <= 5) timerEl.classList.add('danger');
      if(state.timeLeft <= 0) {
        clearInterval(state.timer);
        state.lives--;
        updateLives();
        if(state.lives > 0) nextQuestion();
      }
    }, 1000);
  }

  function checkAns(n, btn) {
    if(state.isPaused) return;
    state.isPaused = true; 
    clearInterval(state.timer);
    if(n === state.ans) {
      btn.classList.add('correct');
      state.score += (state.timeLeft * 10) + 10;
      document.getElementById('scoreVal').innerText = state.score;
    } else {
      btn.classList.add('wrong');
      state.lives--;
      updateLives();
      Array.from(document.querySelectorAll('.opt-btn')).forEach(b => {
        if(parseInt(b.innerText) === state.ans) b.classList.add('correct');
      });
    }
    setTimeout(() => { if(state.lives > 0) nextQuestion(); }, 800);
  }

  function updateLives() {
    const h = ['💀', '❤️', '❤️❤️', '❤️❤️❤️'];
    document.getElementById('livesVal').innerText = h[state.lives] || '💀';
    if(state.lives <= 0) endGame();
  }

  function endGame() {
    clearInterval(state.timer);
    document.getElementById('gameScreen').classList.remove('active');
    document.getElementById('endScreen').classList.add('active');
    document.getElementById('finalScore').innerText = state.score;
  }
</script>
</body>
</html>
