<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MathBlast! ➕➖</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d1a;
    --panel: #14142b;
    --accent: #00f5d4;
    --accent2: #f72585;
    --accent3: #fee440;
    --accent4: #7b2d8b;
    --text: #e8e8f8;
    --muted: #5a5a8a;
    --correct: #06d6a0;
    --wrong: #ef233c;
    --glow: 0 0 20px rgba(0,245,212,0.5);
    --glow2: 0 0 20px rgba(247,37,133,0.5);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Animated background particles */
  .bg-particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .particle {
    position: absolute;
    border-radius: 50%;
    animation: float linear infinite;
    opacity: 0.15;
  }
  @keyframes float {
    from { transform: translateY(110vh) rotate(0deg); opacity: 0; }
    10% { opacity: 0.15; }
    90% { opacity: 0.15; }
    to { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
  }

  /* Stars */
  .star {
    position: absolute;
    width: 2px; height: 2px;
    background: white;
    border-radius: 50%;
    animation: twinkle ease-in-out infinite;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.2; transform: scale(1); }
    50% { opacity: 0.8; transform: scale(1.5); }
  }

  /* ===== SCREENS ===== */
  .screen {
    display: none;
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 600px;
    padding: 20px;
  }
  .screen.active { display: flex; flex-direction: column; align-items: center; }

  /* ===== START SCREEN ===== */
  .logo {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(1.8rem, 5vw, 3rem);
    text-align: center;
    line-height: 1.4;
    margin-bottom: 8px;
    animation: logoPulse 2s ease-in-out infinite;
  }
  .logo .plus { color: var(--accent); text-shadow: var(--glow); }
  .logo .minus { color: var(--accent2); text-shadow: var(--glow2); }

  @keyframes logoPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.03); }
  }

  .tagline {
    font-size: 0.95rem;
    color: var(--muted);
    margin-bottom: 40px;
    text-align: center;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .difficulty-label {
    font-family: 'Press Start 2P', monospace;
    font-size: 0.6rem;
    color: var(--accent3);
    letter-spacing: 2px;
    margin-bottom: 14px;
  }

  .diff-buttons {
    display: flex;
    gap: 12px;
    margin-bottom: 36px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .diff-btn {
    padding: 10px 22px;
    border-radius: 50px;
    border: 2px solid transparent;
    background: var(--panel);
    color: var(--muted);
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .diff-btn:hover { color: var(--text); }
  .diff-btn.selected { border-color: var(--accent); color: var(--accent); box-shadow: var(--glow); }

  .start-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 0.85rem;
    padding: 18px 40px;
    background: linear-gradient(135deg, var(--accent2), var(--accent4));
    color: white;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    letter-spacing: 2px;
    box-shadow: 0 6px 30px rgba(247,37,133,0.4), 0 0 0 0 rgba(247,37,133,0.4);
    animation: btnPulse 2s infinite;
    transition: transform 0.1s;
  }
  .start-btn:hover { transform: translateY(-3px) scale(1.04); }
  .start-btn:active { transform: scale(0.96); }

  @keyframes btnPulse {
    0% { box-shadow: 0 6px 30px rgba(247,37,133,0.4), 0 0 0 0 rgba(247,37,133,0.4); }
    70% { box-shadow: 0 6px 30px rgba(247,37,133,0.4), 0 0 0 20px rgba(247,37,133,0); }
    100% { box-shadow: 0 6px 30px rgba(247,37,133,0.4), 0 0 0 0 rgba(247,37,133,0); }
  }

  /* ===== GAME SCREEN ===== */
  .top-bar {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }
  .score-box, .lives-box, .timer-box {
    background: var(--panel);
    border-radius: 12px;
    padding: 10px 16px;
    text-align: center;
    min-width: 80px;
  }
  .score-box .label, .lives-box .label, .timer-box .label {
    font-size: 0.55rem;
    font-family: 'Press Start 2P', monospace;
    color: var(--muted);
    display: block;
    margin-bottom: 4px;
  }
  .score-box .val { font-size: 1.5rem; font-weight: 900; color: var(--accent3); }
  .lives-box .val { font-size: 1.3rem; }
  .timer-box .val {
    font-size: 1.5rem;
    font-weight: 900;
    font-family: 'Press Start 2P', monospace;
    color: var(--accent);
    transition: color 0.3s;
  }
  .timer-box.danger .val { color: var(--wrong); animation: shake 0.3s infinite; }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-3px); }
    75% { transform: translateX(3px); }
  }

  /* Question card */
  .question-card {
    background: var(--panel);
    border: 2px solid rgba(0,245,212,0.2);
    border-radius: 24px;
    padding: 32px 28px;
    width: 100%;
    text-align: center;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
    transition: all 0.3s;
  }
  .question-card::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(0,245,212,0.05), transparent);
    animation: shimmer 3s infinite;
  }
  @keyframes shimmer { to { left: 200%; } }

  .progress-bar {
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 4px;
    margin-bottom: 20px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 4px;
    transition: width 0.5s ease;
  }

  .question-num {
    font-size: 0.6rem;
    font-family: 'Press Start 2P', monospace;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .question-text {
    font-size: clamp(2.5rem, 8vw, 4rem);
    font-weight: 900;
    letter-spacing: -2px;
    margin-bottom: 8px;
  }
  .question-text .op-plus { color: var(--accent); }
  .question-text .op-minus { color: var(--accent2); }
  .question-text .equals { color: var(--accent3); }
  .question-text .blank {
    display: inline-block;
    min-width: 80px;
    border-bottom: 4px solid var(--muted);
    color: transparent;
    position: relative;
  }

  /* Answer options */
  .options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    width: 100%;
  }
  .opt-btn {
    background: var(--panel);
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 20px 16px;
    font-size: 1.8rem;
    font-weight: 900;
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }
  .opt-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: white;
    opacity: 0;
    border-radius: 14px;
    transform: scale(0);
    transition: all 0.3s;
  }
  .opt-btn:hover {
    border-color: var(--accent);
    transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.3), var(--glow);
  }
  .opt-btn:active { transform: scale(0.96); }
  .opt-btn.correct {
    background: var(--correct);
    border-color: var(--correct);
    color: #0d0d1a;
    animation: correctBounce 0.4s ease;
  }
  .opt-btn.wrong {
    background: var(--wrong);
    border-color: var(--wrong);
    color: white;
    animation: wrongShake 0.4s ease;
  }
  @keyframes correctBounce {
    0% { transform: scale(1); }
    50% { transform: scale(1.12); }
    100% { transform: scale(1); }
  }
  @keyframes wrongShake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    60% { transform: translateX(8px); }
  }

  /* Feedback popup */
  .feedback {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    font-family: 'Press Start 2P', monospace;
    font-size: 1.5rem;
    z-index: 100;
    padding: 20px 32px;
    border-radius: 16px;
    pointer-events: none;
    transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .feedback.show { transform: translate(-50%, -50%) scale(1); }
  .feedback.correct-fb { background: var(--correct); color: #0d0d1a; }
  .feedback.wrong-fb { background: var(--wrong); color: white; }

  /* Streak */
  .streak-badge {
    position: absolute;
    top: 12px; right: 12px;
    background: linear-gradient(135deg, var(--accent3), #ff8800);
    color: #0d0d1a;
    font-family: 'Press Start 2P', monospace;
    font-size: 0.5rem;
    padding: 6px 10px;
    border-radius: 8px;
    display: none;
  }
  .streak-badge.show { display: block; animation: popIn 0.3s ease; }
  @keyframes popIn {
    0% { transform: scale(0) rotate(-10deg); }
    100% { transform: scale(1) rotate(0deg); }
  }

  /* ===== END SCREEN ===== */
  .end-card {
    background: var(--panel);
    border-radius: 24px;
    padding: 36px 32px;
    width: 100%;
    text-align: center;
    border: 2px solid rgba(0,245,212,0.2);
    position: relative;
    overflow: hidden;
  }

  .end-title {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(0.9rem, 3vw, 1.3rem);
    margin-bottom: 6px;
    color: var(--accent3);
  }
  .end-emoji { font-size: 3.5rem; margin: 12px 0; display: block; }

  .end-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin: 24px 0;
  }
  .stat-item {
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    padding: 16px;
  }
  .stat-item .slabel {
    font-size: 0.55rem;
    font-family: 'Press Start 2P', monospace;
    color: var(--muted);
    display: block;
    margin-bottom: 8px;
  }
  .stat-item .sval {
    font-size: 1.8rem;
    font-weight: 900;
  }
  .stat-item:nth-child(1) .sval { color: var(--accent3); }
  .stat-item:nth-child(2) .sval { color: var(--accent); }
  .stat-item:nth-child(3) .sval { color: var(--correct); }
  .stat-item:nth-child(4) .sval { color: var(--accent2); }

  .end-buttons { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .btn-retry {
    font-family: 'Press Start 2P', monospace;
    font-size: 0.7rem;
    padding: 16px 24px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
  }
  .btn-retry:hover { transform: translateY(-3px); }
  .btn-play-again {
    background: linear-gradient(135deg, var(--accent2), var(--accent4));
    color: white;
    box-shadow: 0 4px 20px rgba(247,37,133,0.3);
  }
  .btn-menu {
    background: var(--panel);
    border: 2px solid var(--accent);
    color: var(--accent);
  }

  /* Confetti */
  .confetti-piece {
    position: fixed;
    width: 10px;
    height: 10px;
    top: -10px;
    animation: confettiFall linear forwards;
    pointer-events: none;
    z-index: 50;
    border-radius: 2px;
  }
  @keyframes confettiFall {
    to {
      transform: translateY(105vh) rotate(720deg);
      opacity: 0;
    }
  }
</style>
</head>
<body>

<!-- Background -->
<div class="bg-particles" id="bgParticles"></div>

<!-- Feedback popup -->
<div class="feedback" id="feedback"></div>

<!-- ===== START SCREEN ===== -->
<div class="screen active" id="startScreen">
  <div class="logo">
    <span class="plus">MATH</span><br>
    <span class="minus">BLAST!</span>
  </div>
  <p class="tagline">⚡ Desafio de Matemática ⚡</p>

  <div class="difficulty-label">DIFICULDADE</div>
  <div class="diff-buttons">
    <button class="diff-btn selected" data-diff="easy">😊 Fácil</button>
    <button class="diff-btn" data-diff="medium">😤 Médio</button>
    <button class="diff-btn" data-diff="hard">🔥 Difícil</button>
  </div>

  <button class="start-btn" id="startBtn">▶ JOGAR!</button>
  <br>
  <br>
  <br>
  <p class="tagline">⚡ Powered by Sebastiao Alves de Almeida ⚡</p>

</div>

<!-- ===== GAME SCREEN ===== -->
<div class="screen" id="gameScreen">
  <div class="top-bar">
    <div class="score-box">
      <span class="label">PONTOS</span>
      <span class="val" id="scoreVal">0</span>
    </div>
    <div class="timer-box" id="timerBox">
      <span class="label">TEMPO</span>
      <span class="val" id="timerVal">20</span>
    </div>
    <div class="lives-box">
      <span class="label">VIDAS</span>
      <span class="val" id="livesVal">❤️❤️❤️</span>
    </div>
  </div>

  <div class="question-card" id="questionCard">
    <div class="streak-badge" id="streakBadge">🔥 COMBO!</div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
    <div class="question-num" id="questionNum">PERGUNTA 1 / 10</div>
    <div class="question-text" id="questionText"></div>
  </div>

  <div class="options-grid" id="optionsGrid"></div>
</div>

<!-- ===== END SCREEN ===== -->
<div class="screen" id="endScreen">
  <div class="end-card">
    <div class="end-title" id="endTitle">JOGO ENCERRADO!</div>
    <span class="end-emoji" id="endEmoji">🏆</span>

    <div class="end-stats">
      <div class="stat-item">
        <span class="slabel">PONTUAÇÃO</span>
        <span class="sval" id="statScore">0</span>
      </div>
      <div class="stat-item">
        <span class="slabel">ACERTOS</span>
        <span class="sval" id="statCorrect">0</span>
      </div>
      <div class="stat-item">
        <span class="slabel">MELHOR COMBO</span>
        <span class="sval" id="statStreak">0</span>
      </div>
      <div class="stat-item">
        <span class="slabel">PRECISÃO</span>
        <span class="sval" id="statAccuracy">0%</span>
      </div>
    </div>

    <div class="end-buttons">
      <button class="btn-retry btn-play-again" id="playAgainBtn">🔁 JOGAR DE NOVO</button>
      <button class="btn-retry btn-menu" id="menuBtn">🏠 MENU</button>
    </div>
  </div>
</div>

<script>
  // ======= Background setup =======
  const bgEl = document.getElementById('bgParticles');
  const colors = ['#00f5d4','#f72585','#fee440','#7b2d8b','#4361ee'];

  for (let i = 0; i < 30; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;width:${Math.random()*3+1}px;height:${Math.random()*3+1}px;animation-delay:${Math.random()*4}s;animation-duration:${2+Math.random()*3}s`;
    bgEl.appendChild(s);
  }
  for (let i = 0; i < 12; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 20 + Math.random() * 60;
    p.style.cssText = `left:${Math.random()*100}%;width:${size}px;height:${size}px;background:${colors[i%colors.length]};animation-duration:${8+Math.random()*12}s;animation-delay:${Math.random()*10}s`;
    bgEl.appendChild(p);
  }

  // ======= Game State =======
  const DIFFICULTIES = {
    easy:   { max: 10, totalQ: 10, timePerQ: 20, negAllowed: false },
    medium: { max: 20, totalQ: 12, timePerQ: 15, negAllowed: false },
    hard:   { max: 50, totalQ: 15, timePerQ: 12, negAllowed: true  }
  };

  let state = {
    difficulty: 'easy',
    score: 0,
    lives: 3,
    current: 0,
    correct: 0,
    total: 0,
    streak: 0,
    bestStreak: 0,
    timeLeft: 20,
    timer: null,
    locked: false,
    question: null
  };

  // ======= DOM refs =======
  const screens = { start: document.getElementById('startScreen'), game: document.getElementById('gameScreen'), end: document.getElementById('endScreen') };
  const scoreVal = document.getElementById('scoreVal');
  const timerVal = document.getElementById('timerVal');
  const timerBox = document.getElementById('timerBox');
  const livesVal = document.getElementById('livesVal');
  const questionNum = document.getElementById('questionNum');
  const questionText = document.getElementById('questionText');
  const optionsGrid = document.getElementById('optionsGrid');
  const progressFill = document.getElementById('progressFill');
  const streakBadge = document.getElementById('streakBadge');
  const feedback = document.getElementById('feedback');

  // ======= Difficulty buttons =======
  document.querySelectorAll('.diff-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      state.difficulty = btn.dataset.diff;
    });
  });

  document.getElementById('startBtn').addEventListener('click', startGame);
  document.getElementById('playAgainBtn').addEventListener('click', startGame);
  document.getElementById('menuBtn').addEventListener('click', () => showScreen('start'));

  // ======= Screen transitions =======
  function showScreen(name) {
    Object.values(screens).forEach(s => s.classList.remove('active'));
    screens[name].classList.add('active');
  }

  // ======= Game logic =======
  function startGame() {
    const cfg = DIFFICULTIES[state.difficulty];
    state = {
      difficulty: state.difficulty,
      score: 0, lives: 3, current: 0,
      correct: 0, total: cfg.totalQ,
      streak: 0, bestStreak: 0,
      timeLeft: cfg.timePerQ,
      timer: null, locked: false, question: null
    };
    scoreVal.textContent = '0';
    showScreen('game');
    nextQuestion();
  }

  function generateQuestion() {
    const cfg = DIFFICULTIES[state.difficulty];
    const op = Math.random() < 0.5 ? '+' : '-';
    let a, b;
    if (op === '+') {
      a = Math.floor(Math.random() * cfg.max) + 1;
      b = Math.floor(Math.random() * cfg.max) + 1;
    } else {
      a = Math.floor(Math.random() * cfg.max) + 1;
      b = cfg.negAllowed ? Math.floor(Math.random() * cfg.max) + 1
                         : Math.floor(Math.random() * a) + 1;
    }
    const answer = op === '+' ? a + b : a - b;
    return { a, b, op, answer };
  }

  function generateOptions(answer) {
    const opts = new Set([answer]);
    while (opts.size < 4) {
      const delta = Math.floor(Math.random() * 10) - 5;
      const opt = answer + (delta === 0 ? (Math.random() < 0.5 ? 1 : -1) : delta);
      opts.add(opt);
    }
    return [...opts].sort(() => Math.random() - 0.5);
  }

  function nextQuestion() {
    const cfg = DIFFICULTIES[state.difficulty];
    if (state.current >= cfg.totalQ || state.lives <= 0) {
      endGame(); return;
    }

    state.locked = false;
    state.question = generateQuestion();
    const opts = generateOptions(state.question.answer);

    // UI
    progressFill.style.width = `${(state.current / cfg.totalQ) * 100}%`;
    questionNum.textContent = `PERGUNTA ${state.current + 1} / ${cfg.totalQ}`;

    const opSpan = state.question.op === '+'
      ? `<span class="op-plus">+</span>`
      : `<span class="op-minus">−</span>`;
    questionText.innerHTML = `${state.question.a} ${opSpan} ${state.question.b} <span class="equals">=</span> <span class="blank">?</span>`;

    optionsGrid.innerHTML = '';
    opts.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'opt-btn';
      btn.textContent = opt;
      btn.addEventListener('click', () => handleAnswer(btn, opt));
      optionsGrid.appendChild(btn);
    });

    // Timer
    clearInterval(state.timer);
    state.timeLeft = cfg.timePerQ;
    timerVal.textContent = state.timeLeft;
    timerBox.classList.remove('danger');

    state.timer = setInterval(() => {
      state.timeLeft--;
      timerVal.textContent = state.timeLeft;
      if (state.timeLeft <= 5) timerBox.classList.add('danger');
      if (state.timeLeft <= 0) {
        clearInterval(state.timer);
        timeOut();
      }
    }, 1000);
  }

  function handleAnswer(btn, val) {
    if (state.locked) return;
    state.locked = true;
    clearInterval(state.timer);

    const isCorrect = val === state.question.answer;

    // Highlight all buttons
    optionsGrid.querySelectorAll('.opt-btn').forEach(b => {
      if (parseInt(b.textContent) === state.question.answer) b.classList.add('correct');
    });

    if (isCorrect) {
      btn.classList.add('correct');
      state.correct++;
      state.streak++;
      if (state.streak > state.bestStreak) state.bestStreak = state.streak;
      const cfg = DIFFICULTIES[state.difficulty];
      const bonus = state.streak >= 3 ? 20 : 10;
      const timeBonus = Math.floor(state.timeLeft * 2);
      state.score += bonus + timeBonus;
      scoreVal.textContent = state.score;
      showFeedback(state.streak >= 3 ? `🔥 COMBO x${state.streak}!` : randomPositive(), true);
      if (state.streak >= 3) {
        streakBadge.textContent = `🔥 x${state.streak}`;
        streakBadge.classList.add('show');
      }
    } else {
      btn.classList.add('wrong');
      state.streak = 0;
      state.lives--;
      streakBadge.classList.remove('show');
      updateLives();
      showFeedback(randomNegative(), false);
    }

    state.current++;
    setTimeout(nextQuestion, 1100);
  }

  function timeOut() {
    if (state.locked) return;
    state.locked = true;
    state.lives--;
    state.streak = 0;
    streakBadge.classList.remove('show');
    updateLives();

    optionsGrid.querySelectorAll('.opt-btn').forEach(b => {
      if (parseInt(b.textContent) === state.question.answer) b.classList.add('correct');
    });
    showFeedback('⏰ TEMPO!', false);
    state.current++;
    setTimeout(nextQuestion, 1100);
  }

  function updateLives() {
    const hearts = ['', '❤️', '❤️❤️', '❤️❤️❤️'];
    livesVal.textContent = hearts[Math.max(0, state.lives)];
  }

  function showFeedback(msg, good) {
    feedback.textContent = msg;
    feedback.className = 'feedback show ' + (good ? 'correct-fb' : 'wrong-fb');
    setTimeout(() => { feedback.classList.remove('show'); }, 700);
  }

  const positives = ['✨ ÓTIMO!', '👏 CERTO!', '🎯 PERFEITO!', '⚡ RÁPIDO!', '💪 ARRASOU!'];
  const negatives = ['😬 ERROU!', '💀 OOOPS!', '🙈 NÃO!', '😤 TENTA!'];
  const randomPositive = () => positives[Math.floor(Math.random() * positives.length)];
  const randomNegative = () => negatives[Math.floor(Math.random() * negatives.length)];

  function endGame() {
    clearInterval(state.timer);
    const cfg = DIFFICULTIES[state.difficulty];
    const acc = Math.round((state.correct / cfg.totalQ) * 100);

    document.getElementById('statScore').textContent = state.score;
    document.getElementById('statCorrect').textContent = `${state.correct}/${cfg.totalQ}`;
    document.getElementById('statStreak').textContent = state.bestStreak;
    document.getElementById('statAccuracy').textContent = `${acc}%`;

    let title, emoji;
    if (acc >= 90) { title = 'MESTRE DA MATEMÁTICA!'; emoji = '🏆'; confetti(50); }
    else if (acc >= 70) { title = 'MUITO BOM!'; emoji = '⭐'; confetti(25); }
    else if (acc >= 50) { title = 'CONTINUE TENTANDO!'; emoji = '💪'; }
    else { title = 'PRECISA PRATICAR!'; emoji = '📚'; }

    document.getElementById('endTitle').textContent = title;
    document.getElementById('endEmoji').textContent = emoji;
    showScreen('end');
  }

  // ======= Confetti =======
  function confetti(count) {
    const colors = ['#00f5d4','#f72585','#fee440','#06d6a0','#4361ee','#ff8800'];
    for (let i = 0; i < count; i++) {
      setTimeout(() => {
        const el = document.createElement('div');
        el.className = 'confetti-piece';
        el.style.cssText = `left:${Math.random()*100}vw;background:${colors[Math.floor(Math.random()*colors.length)]};width:${6+Math.random()*10}px;height:${6+Math.random()*10}px;animation-duration:${1.5+Math.random()*2}s;border-radius:${Math.random()>0.5?'50%':'2px'}`;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 3500);
      }, i * 40);
    }
  }
</script>
</body>
</html>
